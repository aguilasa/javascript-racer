<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto;background:#fafafa;border:1px solid #ddd;border-radius:6px">
  <text x="300" y="18" font-size="13" fill="#222" text-anchor="middle" font-weight="bold">descarte de segmentos no loop de render()</text>

  <!-- chao -->
  <line x1="40" y1="190" x2="560" y2="190" stroke="#888" stroke-width="1.5"/>

  <!-- zona descartada: atras da camera -->
  <rect x="70" y="60" width="100" height="130" fill="#c0392b" opacity="0.08"/>
  <line x1="170" y1="60" x2="170" y2="190" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="170" y="52" font-size="11" fill="#c0392b" text-anchor="middle">z = cameraDepth</text>

  <!-- camera -->
  <circle cx="70" cy="120" r="5" fill="#222"/>
  <text x="70" y="140" font-size="11" fill="#222" text-anchor="middle">câmera</text>
  <text x="120" y="205" font-size="10" fill="#c0392b" text-anchor="middle">descartado (atrás)</text>

  <!-- segmentos desenhados, encolhendo com a distancia -->
  <rect x="190" y="150" width="60" height="40" fill="#6B6B6B"/>
  <rect x="255" y="158" width="50" height="32" fill="#696969"/>
  <rect x="310" y="164" width="42" height="26" fill="#6B6B6B"/>
  <rect x="357" y="170" width="35" height="20" fill="#696969"/>
  <rect x="397" y="175" width="28" height="15" fill="#6B6B6B"/>

  <text x="350" y="45" font-size="11" fill="#333" text-anchor="middle">desenhados, do mais próximo ao mais distante</text>

  <!-- linha de maxy -->
  <line x1="190" y1="158" x2="560" y2="158" stroke="#2a6fd6" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="555" y="150" font-size="10" fill="#2a6fd6" text-anchor="end">maxy (atualizado após cada segmento)</text>

  <!-- caixa com as condicoes de descarte -->
  <rect x="40" y="212" width="520" height="40" fill="#fdf6e3" stroke="#d69e2e"/>
  <text x="300" y="228" font-size="12" fill="#7a5c00" text-anchor="middle">descartado se: p1.camera.z ≤ cameraDepth  (atrás da câmera)</text>
  <text x="300" y="245" font-size="12" fill="#7a5c00" text-anchor="middle">ou: p2.screen.y ≥ maxy  (já coberto por um segmento mais próximo)</text>
</svg>
