<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 600 320"
   style="max-width:100%;height:auto;background:#72D7EE;border:1px solid #ddd;border-radius:6px"
   version="1.1"
   id="svg12"
   sodipodi:docname="segmentos-pista-trapezios.svg"
   inkscape:version="1.4.4 (dcaf3e7d9e, 2026-05-05)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <defs
     id="defs12" />
  <sodipodi:namedview
     id="namedview12"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="2.634375"
     inkscape:cx="299.31198"
     inkscape:cy="160"
     inkscape:window-width="2560"
     inkscape:window-height="1044"
     inkscape:window-x="1600"
     inkscape:window-y="0"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg12" />
  <!-- grama de fundo -->
  <rect
     x="0"
     y="0"
     width="600"
     height="320"
     fill="#10AA10"
     id="rect1" />
  <rect
     x="0"
     y="0"
     width="600"
     height="60"
     fill="#72D7EE"
     id="rect2" />
  <!-- trapezios da pista, do mais distante (topo, escuro) ao mais proximo (base, claro) -->
  <!-- t: 0(base)->1(topo/vanishing point) | xL(t)=60+240t xR(t)=540-240t y(t)=280-220t -->
  <polygon
     points="264,93 336,93 300,60 300,60"
     fill="#009A00"
     id="polygon2" />
  <polygon
     points="204,148 396,148 336,93 264,93"
     fill="#6B6B6B"
     id="polygon3" />
  <polygon
     points="144,203 456,203 396,148 204,148"
     fill="#696969"
     id="polygon4" />
  <polygon
     points="96,247 504,247 456,203 144,203"
     fill="#6B6B6B"
     id="polygon5" />
  <polygon
     points="60,280 540,280 504,247 96,247"
     fill="#696969"
     id="polygon6" />
  <!-- rumble strips (faixas vermelho/branco) nas bordas do segmento mais proximo -->
  <polygon
     points="60,280 96,247 108,247 68,280"
     fill="#c0392b"
     id="polygon7" />
  <polygon
     points="540,280 504,247 492,247 532,280"
     fill="#c0392b"
     id="polygon8" />
  <!-- marcador de faixa central no segmento mais proximo -->
  <line
     x1="300"
     y1="280"
     x2="300"
     y2="247"
     stroke="#CCCCCC"
     stroke-width="4"
     id="line8" />
  <!-- linha do horizonte -->
  <line
     x1="0"
     y1="60"
     x2="600"
     y2="60"
     stroke="#ffffff"
     stroke-width="1"
     stroke-dasharray="4 3"
     opacity="0.7"
     id="line9" />
  <text
     x="470"
     y="53"
     font-size="12"
     fill="#ffffff"
     text-anchor="middle"
     id="text9">linha do horizonte</text>
  <!-- labels p1/p2 do segmento mais proximo (o primeiro a ser desenhado) -->
  <line
     x1="60"
     y1="280"
     x2="20"
     y2="280"
     stroke="#222"
     stroke-width="1"
     id="line10" />
  <text
     x="20"
     y="284"
     font-size="13px"
     fill="#222222"
     text-anchor="end"
     font-weight="bold"
     id="text10">p1</text>
  <line
     x1="96"
     y1="247"
     x2="20"
     y2="235"
     stroke="#222"
     stroke-width="1"
     id="line11" />
  <text
     x="20"
     y="238"
     font-size="13px"
     fill="#222222"
     text-anchor="end"
     font-weight="bold"
     id="text11">p2</text>
  <text
     x="318.19299"
     y="292.98627"
     font-size="11.4151px"
     fill="#222222"
     text-anchor="middle"
     font-style="italic"
     id="text12"
     transform="scale(0.95125414,1.0512438)"
     style="stroke-width:0.951254">cada segmento é um trapézio entre p1 (mais próximo) e p2 (mais distante) — projetados a cada frame</text>
</svg>
