<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 600 230" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto;background:#fafafa;border:1px solid #ddd;border-radius:6px">
  <!-- painel esquerdo: Z-map (raster) -->
  <text x="130" y="24" font-size="13" fill="#222" text-anchor="middle" font-weight="bold">1) Z-map (raster puro)</text>
  <rect x="60" y="35" width="140" height="160" fill="#333" stroke="#222"/>
  <!-- faixas horizontais, escurecendo perto da camera (base) -->
  <rect x="60" y="35"  width="140" height="16" fill="#e8e8e8"/>
  <rect x="60" y="51"  width="140" height="16" fill="#cfcfcf"/>
  <rect x="60" y="67"  width="140" height="20" fill="#b3b3b3"/>
  <rect x="60" y="87"  width="140" height="24" fill="#969696"/>
  <rect x="60" y="111" width="140" height="28" fill="#797979"/>
  <rect x="60" y="139" width="140" height="28" fill="#5c5c5c"/>
  <rect x="60" y="167" width="140" height="28" fill="#3f3f3f"/>

  <!-- linhas de chamada para a tabela -->
  <line x1="200" y1="43"  x2="240" y2="43"  stroke="#888" stroke-width="1"/>
  <line x1="200" y1="97"  x2="240" y2="97"  stroke="#888" stroke-width="1"/>
  <line x1="200" y1="153" x2="240" y2="153" stroke="#888" stroke-width="1"/>
  <line x1="200" y1="181" x2="240" y2="181" stroke="#888" stroke-width="1"/>

  <!-- tabela pre-computada -->
  <rect x="240" y="30" width="110" height="170" fill="#eef4ff" stroke="#2a6fd6"/>
  <text x="295" y="46" font-size="11" fill="#2a6fd6" text-anchor="middle" font-weight="bold">tabela (linha→z)</text>
  <text x="250" y="65"  font-size="11" fill="#222">linha 1  →  z = 3000</text>
  <text x="250" y="90"  font-size="11" fill="#222">linha 4  →  z = 1200</text>
  <text x="250" y="150" font-size="11" fill="#222">linha 9  →  z =  400</text>
  <text x="250" y="180" font-size="11" fill="#222">linha 12 →  z =  200</text>

  <text x="130" y="212" font-size="11" fill="#666" text-anchor="middle">horizonte no topo, câmera embaixo</text>

  <!-- divisor -->
  <line x1="390" y1="20" x2="390" y2="215" stroke="#ccc" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- painel direito: segmentos poligonais -->
  <text x="495" y="24" font-size="13" fill="#222" text-anchor="middle" font-weight="bold">2) Segmentos poligonais</text>
  <polygon points="470,175 520,175 512,150 478,150" fill="#696969" stroke="#444"/>
  <polygon points="478,150 512,150 507,130 483,130" fill="#6B6B6B" stroke="#444"/>
  <polygon points="483,130 507,130 504,112 486,112" fill="#696969" stroke="#444"/>
  <polygon points="486,112 504,112 502,98  488,98"  fill="#6B6B6B" stroke="#444"/>
  <text x="495" y="197" font-size="11" fill="#222" text-anchor="middle">p1</text>
  <text x="495" y="145" font-size="10" fill="#222" text-anchor="middle">p2/p1</text>
  <text x="495" y="212" font-size="11" fill="#666" text-anchor="middle">cada trapézio = 1 chamada a Util.project</text>
</svg>
