<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 600 560"
   style="max-width:100%;height:auto;background:#fafafa;border:1px solid #ddd;border-radius:6px"
   version="1.1"
   id="svg11"
   sodipodi:docname="anel-segmentos-loop.svg"
   inkscape:version="1.4.4 (dcaf3e7d9e, 2026-05-05)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <defs
     id="defs11" />
  <sodipodi:namedview
     id="namedview11"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="1.5811239"
     inkscape:cx="299.47052"
     inkscape:cy="229.89975"
     inkscape:window-width="2560"
     inkscape:window-height="1044"
     inkscape:window-x="1600"
     inkscape:window-y="0"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg11" />
  <text
     x="300"
     y="24"
     font-size="13"
     fill="#222"
     text-anchor="middle"
     font-weight="bold"
     id="text1">os 500 segmentos formam um anel (loop) — segments[i % segments.length]</text>
  <!-- anel base representando os 500 segmentos -->
  <circle
     cx="300"
     cy="270"
     r="190"
     fill="none"
     stroke="#696969"
     stroke-width="26"
     id="circle1" />
  <!-- arco destacado: janela de drawDistance desenhada a partir da camera -->
  <path
     d="M 487,303 A 190,190 0 1,1 168,133"
     fill="none"
     stroke="#2a6fd6"
     stroke-width="30"
     opacity="0.35"
     id="path1" />
  <!-- indice 0, no topo -->
  <line
     x1="300"
     y1="67"
     x2="300"
     y2="42"
     stroke="#222"
     stroke-width="1.5"
     id="line1" />
  <text
     x="300"
     y="38"
     font-size="12px"
     fill="#222222"
     text-anchor="middle"
     id="text2">índice 0</text>
  <!-- START, logo apos o indice 0 -->
  <line
     x1="369"
     y1="79"
     x2="378"
     y2="56"
     stroke="#222"
     stroke-width="1.5"
     id="line2" />
  <text
     x="400"
     y="46"
     font-size="12"
     fill="#222"
     text-anchor="start"
     font-weight="bold"
     id="text3">START</text>
  <text
     x="400"
     y="60"
     font-size="10"
     fill="#555"
     text-anchor="start"
     id="text4">(findSegment(playerZ) + 2/+3)</text>
  <!-- FINISH, logo antes do indice 0 -->
  <line
     x1="231"
     y1="79"
     x2="222"
     y2="56"
     stroke="#222"
     stroke-width="1.5"
     id="line4" />
  <text
     x="200"
     y="46"
     font-size="12"
     fill="#222"
     text-anchor="end"
     font-weight="bold"
     id="text5">FINISH</text>
  <text
     x="200"
     y="60"
     font-size="10"
     fill="#555"
     text-anchor="end"
     id="text6">(últimos rumbleLength índices)</text>
  <!-- camera / baseSegment -->
  <circle
     cx="487"
     cy="303"
     r="7"
     fill="#c0392b"
     id="circle6" />
  <text
     x="383.74008"
     y="299.11252"
     font-size="12px"
     fill="#c0392b"
     text-anchor="start"
     id="text7">câmera agora</text>
  <text
     x="262.1553"
     y="313.22504"
     font-size="10px"
     fill="#c0392b"
     text-anchor="start"
     id="text8">(baseSegment = findSegment(position))</text>
  <!-- rotulo do arco -->
  <text
     x="187"
     y="500"
     font-size="12"
     fill="#2a6fd6"
     text-anchor="middle"
     id="text9">drawDistance segmentos</text>
  <text
     x="187"
     y="516"
     font-size="12"
     fill="#2a6fd6"
     text-anchor="middle"
     id="text10">desenhados à frente da câmera</text>
  <text
     x="300"
     y="545"
     font-size="11"
     fill="#555"
     text-anchor="middle"
     font-style="italic"
     id="text11">
    findSegment(z) = segments[ ⌊z / segmentLength⌋ % segments.length ]  →  wrap-around automático
  </text>
</svg>
