<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 560 380" xmlns="http://www.w3.org/2000/svg" style="max-width:100%;height:auto;background:#fafafa;border:1px solid #ddd;border-radius:6px">
  <text x="280" y="20" font-size="13" fill="#222" text-anchor="middle" font-weight="bold">curvas são uma ilusão de câmera: nenhum segmento tem x real diferente do outro</text>

  <!-- camera -->
  <circle cx="140" cy="20" r="0" fill="none"/>
  <text x="140" y="36" font-size="11" fill="#222" text-anchor="middle">câmera</text>
  <line x1="140" y1="40" x2="140" y2="48" stroke="#222" stroke-width="1.5"/>

  <!-- linha do mundo (reta, x sempre 0) -->
  <line x1="140" y1="50" x2="140" y2="310" stroke="#999" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="140" y="330" font-size="11" fill="#666" text-anchor="middle">mundo: p.world.x = 0 sempre</text>
  <text x="140" y="344" font-size="11" fill="#666" text-anchor="middle">(z aumenta a cada segmento)</text>

  <!-- pontos no mundo -->
  <circle cx="140" cy="50"  r="5" fill="#888"/>
  <circle cx="140" cy="100" r="5" fill="#888"/>
  <circle cx="140" cy="150" r="5" fill="#888"/>
  <circle cx="140" cy="200" r="5" fill="#888"/>
  <circle cx="140" cy="250" r="5" fill="#888"/>
  <circle cx="140" cy="300" r="5" fill="#888"/>

  <!-- conectores tracejados mundo -> tela -->
  <line x1="140" y1="50"  x2="140" y2="50"  stroke="#ccc" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="140" y1="100" x2="147" y2="100" stroke="#ccc" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="140" y1="150" x2="161" y2="150" stroke="#ccc" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="140" y1="200" x2="182" y2="200" stroke="#ccc" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="140" y1="250" x2="210" y2="250" stroke="#ccc" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="140" y1="300" x2="245" y2="300" stroke="#ccc" stroke-width="1" stroke-dasharray="2 3"/>

  <text x="200" y="196" font-size="9" fill="#c0392b" text-anchor="start">-x (pequeno)</text>
  <text x="255" y="296" font-size="9" fill="#c0392b" text-anchor="start">-x (grande)</text>

  <!-- curva resultante na projeção -->
  <polyline points="140,50 147,100 161,150 182,200 210,250 245,300"
            fill="none" stroke="#2a6fd6" stroke-width="2.5"/>
  <circle cx="140" cy="50"  r="5" fill="#2a6fd6"/>
  <circle cx="147" cy="100" r="5" fill="#2a6fd6"/>
  <circle cx="161" cy="150" r="5" fill="#2a6fd6"/>
  <circle cx="182" cy="200" r="5" fill="#2a6fd6"/>
  <circle cx="210" cy="250" r="5" fill="#2a6fd6"/>
  <circle cx="245" cy="300" r="5" fill="#2a6fd6"/>

  <text x="330" y="150" font-size="11" fill="#2a6fd6" text-anchor="start">posição usada na projeção</text>
  <text x="330" y="164" font-size="11" fill="#2a6fd6" text-anchor="start">(cameraX − x acumulado)</text>
  <text x="330" y="182" font-size="11" fill="#2a6fd6" text-anchor="start">→ é isso que "curva" na tela</text>

  <text x="280" y="365" font-size="11" fill="#555" text-anchor="middle" font-style="italic">
    x(n) = Σ dx  e  dx = Σ curve   →   o deslocamento cresce a cada segmento mais distante
  </text>
</svg>
