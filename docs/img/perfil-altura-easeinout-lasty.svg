     y="234"
     font-size="10"
     fill="#555"
     text-anchor="middle"
     id="text4">endY</text>
  <!-- continuidade para o proximo trecho -->
  <line
     x1="540"
     y1="60"
     x2="600"
     y2="60"
     stroke="#27ae60"
     stroke-width="2"
     stroke-dasharray="4 3"
